# >>> claudeconf managed >>>
# Generated by the claudeconf skill. Edit tools/versions via `.claudeconf/manifest.json`.
# Node tools run via `npx` so the project-local pinned devDeps resolve (not the global PATH).
# Install hooks: `npx lefthook install` (wired into the package.json `prepare` script).
pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: npx biome lint {staged_files}
    typecheck:
      run: npx tsc --noEmit
    secret-scan:
      exclude: ["package-lock.json", "*.lock"]
      run: trufflehog filesystem {staged_files} --no-update --no-verification --fail
    unit:
      glob: "*.{ts,tsx}"
      run: npx vitest related --run {staged_files}
commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
pre-push:
  parallel: true
  commands:
    unit-full:
      run: npx vitest run
    sast:
      run: semgrep scan --error --quiet --config .claudeconf/semgrep.yml   # needs semgrep on PATH; CI runs it via the pinned Docker image
    dependency-audit:
      run: npm audit --audit-level=high || true   # advisory, never blocks
    build:
      run: npx tsup
# Run manually (or in CI) as the full pre-merge gate: `npx lefthook run gate`
gate:
  parallel: false
  commands:
    unit-coverage:
      run: npx vitest run --coverage
    e2e:
      run: npx vitest run test/integration/
    sast:
      run: semgrep scan --error --quiet --config .claudeconf/semgrep.yml
    dependency-audit:
      run: npm audit --audit-level=high || true   # advisory
    build:
      run: npx tsup
# <<< claudeconf managed <<<
