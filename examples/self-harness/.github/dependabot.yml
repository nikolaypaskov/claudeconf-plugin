# Keeps pinned dependencies and SHA-pinned GitHub Actions fresh — the upgrade path
# for a pin-everything harness. Generated by the claudeconf skill.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
