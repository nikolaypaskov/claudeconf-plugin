# Keeps pinned dependencies and SHA-pinned GitHub Actions fresh — the upgrade path
# for a pin-everything harness. Generated by the claudeconf skill.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Release-age quarantine on the UPDATE path (constitution §4.6); pairs with
    # .npmrc min-release-age on the install path. Version updates only — security
    # updates bypass cooldown by design.
    cooldown:
      default-days: 2
      semver-major-days: 7
    groups:
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
      semver-major-days: 7
# <<< claudeconf managed <<<
