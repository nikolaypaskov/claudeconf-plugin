# >>> claudeconf managed >>>
# Generated by the claudeconf skill — mirrors the local `gate` tier (authoritative PR signal).
# Actions pinned by full commit SHA; docker images by immutable @sha256: digest
# (constitution §4.1, wiring-principles §8); trailing comments record the versions
# Dependabot bumps.
name: ci
on:
  push:
    branches: [main]
  pull_request:
# Least privilege by default.
permissions:
  contents: read
# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false  # no push from CI; don't leave a token in .git/config
          fetch-depth: 0  # check-suppressions needs the merge base (fails closed on shallow clones)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: pin npm (release-age floor needs npm >= 11.10)
        run: npm install -g npm@11.17.0
      - name: install (frozen)
        # Frozen install against the committed lockfile — no fresh-resolution
        # fallback (wiring-principles §8).
        run: npm ci
      - name: format (check, advisory)
        run: npx biome format .
        continue-on-error: true   # format is advisory at every tier (constitution §2)
      - name: lint
        run: npx biome lint .
      - name: typecheck
        run: npx tsc --noEmit
      - name: unit + coverage
        run: npx vitest run --coverage
      - name: e2e (integration)
        run: npx vitest run test/integration/
      - name: validate eval fixtures
        run: node scripts/validate-fixtures.mjs
      - name: suppression approval ledger
        run: node scripts/check-suppressions.mjs
      - name: build
        run: npx tsup
      - name: dependency-audit
        run: npm audit --audit-level=high || true   # advisory
  # Blocks PRs that add vulnerable deps / disallowed licenses (the gate-tier
  # "license/dependency review"). Skipped on private repos without GitHub Advanced
  # Security (the action can't run there); runs and blocks on public repos.
  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: SAST (semgrep, pinned offline ruleset)
        uses: docker://semgrep/semgrep@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e  # 1.168.0
        with:
          args: semgrep scan --error --quiet --config .claudeconf/rules/
      - name: secret-scan (trufflehog)
        uses: docker://trufflesecurity/trufflehog@sha256:96f8429082cb2d4ae73b1096dcdb2f5aa139881d97042b0c5e5fa226a392e056  # 3.95.6
        with:
          args: filesystem . --no-update --no-verification --fail --exclude-paths .claudeconf/trufflehog-exclude.txt
  # Executed-fixture proof (EVAL execution requirement): the flagship node-app
  # fixture runs END TO END — provisioned pinned tools, fresh temp git repo,
  # frozen install, forced pre-commit, the full gate — and every expected gate
  # job is asserted to have actually executed. Structural validation alone
  # cannot prove Gate ≡ CI (contract §3.4).
  fixture-exec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
      - name: provision pinned tools (checksum-verified where available)
        run: SEMGREP_VERSION=1.167.0 ./scripts/provision-tools.sh
      - name: run the node-app fixture end to end
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/fixture-exec"
          mkdir -p "$work"
          cp -R evals/fixtures/node-app/. "$work"
          cd "$work"
          git init -qb main
          git -c user.email=ci@claudeconf -c user.name=ci add -A
          git -c user.email=ci@claudeconf -c user.name=ci commit -qm seed
          npm ci
          npx lefthook validate
          npx lefthook run pre-commit --all-files
          SUPPRESSION_BASE=HEAD npx lefthook run gate 2>&1 | tee gate.log
          for job in tool-versions workflow-audit suppressions format-check lint typecheck unit-coverage sast secret-scan dependency-audit build e2e; do
            grep -q "$job" gate.log || { echo "gate job did not execute: $job"; exit 1; }
          done

  # The workflow file is itself a supply-chain artifact (contract §1): a pinned
  # syntax auditor + pinned security auditor check it here AND in the local gate
  # (recorded in manifest ci.auditors).
  workflow-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: actionlint (workflow syntax + shellcheck)
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667  # 1.7.12
      - name: zizmor (workflow security audit)
        run: pipx run zizmor==1.27.0 --min-severity medium .github/workflows/
# <<< claudeconf managed <<<
