# >>> claudeconf managed >>>
# Generated by the claudeconf skill — mirrors the local `gate` tier (authoritative PR signal).
name: ci
on:
  push:
    branches: [main]
  pull_request:
# Least privilege by default.
permissions:
  contents: read
# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci || npm install
      - name: format (check)
        run: npx biome format .
      - name: lint
        run: npx biome lint .
      - name: typecheck
        run: npx tsc --noEmit
      - name: unit + coverage
        run: npx vitest run --coverage
      - name: e2e (integration)
        run: npx vitest run test/integration/
      - name: build
        run: npx tsup
      - name: dependency-audit
        run: npm audit --audit-level=high || true   # advisory
  # Blocks PRs that add vulnerable deps / disallowed licenses (the gate-tier
  # "license/dependency review"). Skipped on private repos without GitHub Advanced
  # Security (the action can't run there); runs and blocks on public repos.
  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: SAST (semgrep, pinned offline ruleset)
        uses: docker://semgrep/semgrep:1.167.0
        with:
          args: semgrep scan --error --quiet --config .claudeconf/semgrep.yml
      - name: secret-scan (trufflehog)
        uses: docker://trufflesecurity/trufflehog:3.95.6
        with:
          args: filesystem . --no-update --no-verification --fail --exclude-paths .claudeconf/trufflehog-exclude.txt
