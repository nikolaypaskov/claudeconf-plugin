# Starter SAST ruleset managed by claudeconf — extend with project-specific rules.
# Pinned + offline (never `--config auto`) so scans stay deterministic.
rules:
  - id: claudeconf-no-shell-exec
    languages: [ts, js]
    severity: WARNING
    message: Prefer execFile/spawn with an args array over shell-string exec to avoid injection.
    pattern-regex: '\b(child_process\.)?exec\s*\('
  - id: claudeconf-no-eval
    languages: [ts, js]
    severity: ERROR
    message: Avoid eval()/Function() dynamic execution; it is a common injection sink.
    pattern-regex: '\b(eval|Function)\s*\('
